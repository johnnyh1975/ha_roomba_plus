# Generated by aurora@aurora-smart-home (ha-integration-dev skill)
# https://github.com/tonylofgren/aurora-smart-home
clean_room:
  name: Clean room
  description: >
    Start a targeted clean of one or more named rooms on smart-map robots
    (i7, s9, j-series). Room names must match the labels assigned in the
    Roomba+ options. All rooms must be on the same floor. Provide either
    room_name or room_passes — not both.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum
  fields:
    room_name:
      name: Room name
      description: >
        Name of the room to clean, or a list of room names to clean in
        sequence. Names are matched case-insensitively against the labels
        you assigned in the Roomba+ options. Use room_passes instead if you
        need a different two-pass setting per room in the same sequence.
      required: false
      example: "Kitchen"
      selector:
        text:
    ordered:
      name: Ordered sequence
      description: >
        When cleaning multiple rooms, clean them in the order supplied
        rather than letting the robot choose its own sequence.
        Has no effect when a single room is given.
      required: false
      default: true
      selector:
        boolean:
    two_pass:
      name: Two-pass cleaning
      description: >
        When true, the robot makes two cleaning passes over each room.
        When omitted (default), the robot's current two-pass setting is
        inherited. Overrides the global setting for this job only. Ignored
        for any room that specifies its own two_pass via room_passes.
      required: false
      selector:
        boolean:
    room_passes:
      name: Rooms with individual pass settings
      description: >
        Alternative to room_name — a list of rooms to clean in sequence,
        each with its own optional two-pass setting. Rooms without an
        explicit two_pass fall back to the global two_pass field, then to
        the robot's current setting. Example:
        [{name: Kitchen, two_pass: true}, {name: Hallway}]
      required: false
      example: '[{"name": "Kitchen", "two_pass": true}, {"name": "Hallway"}]'
      selector:
        object:

reset_filter:
  name: Reset filter
  description: >
    Record the current time as the filter replacement date and restart the
    remaining-life counter. Use after physically replacing the filter.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum

reset_brush:
  name: Reset brushes
  description: >
    Record the current time as the brush replacement date and restart the
    remaining-life counter. Use after physically replacing the brush roll.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum

reset_battery:
  name: Reset battery
  description: >
    Record the current time as the battery replacement date.
    Use after physically replacing the battery pack.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum

reset_pad:
  name: Reset cleaning pad
  description: >
    Record the current time as the pad replacement date (Braava mops only).
    Use after replacing the reusable or disposable cleaning pad.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum

smart_start:
  name: Smart start
  description: >
    Start a clean with blocking-sensor checks. If any configured blocking
    sensors are active, the start is queued or aborted depending on the
    integration configuration. Use in automations instead of vacuum.start
    when you want to prevent cleaning while doors are open or rooms occupied.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum
  fields:
    rooms:
      name: Rooms
      description: >
        Optional list of room names to clean (SMART robots only).
        Names must match the labels configured in Roomba+ options.
      required: false
      selector:
        text:
          multiple: true
    override_blocking:
      name: Override blocking sensors
      description: >
        When true, start immediately even if blocking sensors are active.
        Useful for manual overrides in time-sensitive situations.
      required: false
      default: false
      selector:
        boolean:

clean_sequence:
  name: "Start sequence clean"
  description: >
    Start robot B when robot A completes its current mission.
    The listener fires once and removes itself automatically.
  fields:
    entity_id:
      name: "Trigger robot"
      description: "Vacuum entity for robot A (must finish first)."
      required: true
      selector:
        entity:
          domain: vacuum
    target_entity_id:
      name: "Target robot"
      description: "Vacuum entity for robot B (started after A finishes)."
      required: true
      selector:
        entity:
          domain: vacuum
    require_completed:
      name: "Require completion"
      description: >
        When true (default), robot B starts only if robot A docked normally.
        When false, robot B starts even if A was stopped or had an error.
      required: false
      default: true
      selector:
        boolean:
    delay_minutes:
      name: "Delay (minutes)"
      description: "Wait this many minutes after robot A docks before starting robot B."
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 60
          step: 1
          unit_of_measurement: min

reset_wheel_cleaning:
  name: Reset wheel cleaning
  description: >
    Record the current time as the wheel module last-cleaned date.
    Use after cleaning the wheel module and front caster.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum

reset_contact_cleaning:
  name: Reset contact cleaning
  description: >
    Record the current time as the charging contacts last-cleaned date.
    Use after cleaning the dock and robot charging contacts.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum

reset_bin_cleaning:
  name: Reset bin cleaning
  description: >
    Record the current time as the bin last-cleaned date.
    Use after washing or wiping out the dust bin.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum

reset_robot_profile:
  name: Reset robot profile
  description: >
    Wipe all self-calibrated learned state (dirt baselines, navigation
    efficiency, maintenance intervals) so the robot starts learning fresh.
    Use after moving house, a major layout change, or replacing the robot.
    Mission history is not affected.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum

advance_room:
  name: Advance room progress
  description: >
    Manually advances the room progress indicator by one step. Use when the
    current room or next room sensor is stuck on a completed room on lewis
    firmware robots (i7/s9/j-series). Only takes effect when the robot is
    not actively cleaning (between rooms). Requires an active mission.
  target:
    entity:
      integration: roomba_plus
      domain: vacuum

explain_mission:
  name: Explain mission
  description: >
    Rule-based explanation for why a mission was flagged anomalous:
    obstacle_or_blockage, excessive_recharge, dirt_spike, or
    incomplete_coverage — plus whether the robot was picked up
    (robot_lifted) and any recorded error_code, which can apply
    independently of the primary reason. Defaults to the most recent
    mission when mission_id is omitted.
  fields:
    entity_id:
      name: Robot
      description: Vacuum entity for the robot whose mission history to check.
      required: true
      selector:
        entity:
          domain: vacuum
    mission_id:
      name: Mission ID
      description: >
        Specific mission to explain (the "id" field from mission history,
        e.g. "m_1719849600"). Omit to explain the most recent mission.
      required: false
      selector:
        text:

clean_overdue_rooms:
  name: Clean overdue rooms
  description: >-
    Start a targeted clean of all rooms currently overdue according to the
    rooms_overdue sensor (configured frequency, or the room's own learned
    interval). The route between the selected rooms is travel-optimized
    starting from the dock. Does nothing when no room is
    overdue — safe to call daily from an automation. Requires a Smart Map
    robot (i/s/j-series, Braava m6).
  fields:
    entity_id:
      name: Entity
      description: The Roomba vacuum entity.
      required: true
      selector:
        entity:
          domain: vacuum
          integration: roomba_plus
    max_rooms:
      name: Maximum rooms
      description: Optional cap — keep only the worst-overdue rooms.
      required: false
      selector:
        number:
          min: 1
          max: 20
          mode: box

auto_clean_dirty_rooms:
  name: Auto-clean dirty rooms
  description: >-
    Start a targeted clean of the rooms that are currently dirtier than the
    household average (learned per-room dirt index); the route between the
    selected rooms is travel-optimized starting from the dock. Rooms
    with fewer than 10 recorded cleanings are not trusted yet; when no room
    qualifies, a normal whole-house clean starts instead. Requires a Smart
    Map robot.
  fields:
    entity_id:
      name: Entity
      description: The Roomba vacuum entity.
      required: true
      selector:
        entity:
          domain: vacuum
          integration: roomba_plus
    max_rooms:
      name: Maximum rooms
      description: Optional cap — keep only the dirtiest rooms.
      required: false
      selector:
        number:
          min: 1
          max: 20
          mode: box
