name: Release

# Two ways to run this:
# 1. Push a tag matching v*.*.* (e.g. `git tag v3.1.0 && git push --tags`) — runs automatically.
# 2. Actions tab → Release → "Run workflow" → enter a tag manually. Useful for a
#    safe first test: use a throwaway tag like v0.0.1-test, then delete the
#    resulting release + tag afterwards from the Releases page if it was just a test.
#    Manual runs build from whichever branch is selected in the dropdown (defaults
#    to main) — the new tag is created pointing at that commit.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to package and release (e.g. v3.1.0). Use a throwaway tag like v0.0.1-test for a safe test run — it still gets a real release, but you can delete it afterwards from the Releases page."
        required: true
        type: string

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Derive version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG} -> Version: ${VERSION}"

      - name: Validate manifest.json version matches tag
        run: |
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/roomba_plus/manifest.json'))['version'])")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $MANIFEST_VERSION"

      # ── Added (session: CI pipeline review) ────────────────────────────
      # Zero-failure-before-packaging as a pipeline gate, not a convention
      # someone has to remember. Placed as early as possible — right after
      # the cheap version-string check, before spending any time on
      # release-notes lookup or ZIP packaging. Same full-suite choice
      # (no --ignore flags) as validate.yml's test job, kept deliberately
      # consistent: the PR gate and the release gate should never silently
      # test different things.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-test-frozen.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test-frozen.txt

      - name: Run full test suite (release gate — must pass before packaging)
        run: |
          python -m pytest tests/ -q
      # ── End added section ───────────────────────────────────────────────

      - name: Prepare release notes
        id: notes
        run: |
          NOTES_FILE="release-notes/${{ steps.version.outputs.tag }}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No $NOTES_FILE found — release will be created without notes body. Commit it before tagging next time."
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build HACS-install ZIP
        # CRITICAL: zip_release extracts the ENTIRE zip content directly
        # into custom_components/roomba_plus/ with NO path stripping
        # (see hacs/integration's async_download_zip_file — unlike the
        # non-zip_release archive path, which does strip a custom_components/
        # <domain> prefix, zip_release does not). The zip root must
        # therefore contain the integration's bare files (__init__.py,
        # manifest.json, etc.) directly — NOT wrapped in a
        # custom_components/roomba_plus/ folder. Wrapping it caused a
        # doubled-nesting bug (custom_components/roomba_plus/
        # custom_components/roomba_plus/...) for every user updating
        # through the zip_release path — fixed here for v3.1.2.
        # hacs.json is intentionally NOT included: HACS reads it directly
        # from the repo root via the GitHub API, never from this zip.
        run: |
          mkdir -p /tmp/hacs-package
          cp -r custom_components/roomba_plus/. /tmp/hacs-package/
          cd /tmp/hacs-package
          zip -r "${GITHUB_WORKSPACE}/ha_roomba_plus.zip" .

      # ── Added (session: CI pipeline review) ────────────────────────────
      # Directly motivated by a near-miss during this project's own v3.4.2
      # work: a build was produced with custom_components/roomba_plus/
      # wrapped inside the zip PLUS hacs.json included — exactly the
      # doubled-nesting bug the comment above says was already fixed once,
      # in v3.1.2. Caught only because the packaging logic above was
      # checked by hand against what had been built; this makes that
      # check automatic instead of relying on a human noticing again.
      - name: Validate HACS ZIP structure
        run: |
          echo "Checking ha_roomba_plus.zip structure..."
          FILE_LIST=$(unzip -l ha_roomba_plus.zip | awk 'NR>3 {print $4}' | grep -v '^$')

          if ! echo "$FILE_LIST" | grep -qx "manifest.json"; then
            echo "::error::manifest.json not found at zip root — is custom_components/roomba_plus/ wrapped instead of flattened?"
            echo "$FILE_LIST"
            exit 1
          fi

          if echo "$FILE_LIST" | grep -q "custom_components"; then
            echo "::error::Found a 'custom_components' path inside the zip — this is the doubled-nesting bug fixed in v3.1.2. The zip must contain the bare files of custom_components/roomba_plus/ directly, not the folder itself."
            echo "$FILE_LIST" | grep "custom_components"
            exit 1
          fi

          if echo "$FILE_LIST" | grep -qx "hacs.json"; then
            echo "::error::hacs.json found inside the zip — it must NOT be included; HACS reads it from the repo root via the GitHub API, never from this zip."
            exit 1
          fi

          echo "ha_roomba_plus.zip structure OK: manifest.json at root, no custom_components/ wrapper, no hacs.json."
      # ── End added section ───────────────────────────────────────────────

      - name: Build full-review ZIP
        run: |
          mkdir -p /tmp/full-package
          cp -r custom_components /tmp/full-package/
          cp -r tests /tmp/full-package/
          cp -r docs /tmp/full-package/
          cp -r blueprints /tmp/full-package/
          cp -r scripts /tmp/full-package/
          cp -r .github /tmp/full-package/
          cp hacs.json /tmp/full-package/
          cp README.md /tmp/full-package/
          cp pyproject.toml /tmp/full-package/
          if [ "${{ steps.notes.outputs.found }}" = "true" ]; then
            cp "${{ steps.notes.outputs.path }}" "/tmp/full-package/RELEASE_NOTES_${{ steps.version.outputs.tag }}.md"
          fi
          cd /tmp/full-package
          zip -r "${GITHUB_WORKSPACE}/ha_roomba_plus-${{ steps.version.outputs.tag }}-full.zip" .

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.found == 'true' && steps.notes.outputs.path || '' }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, 'b') || contains(steps.version.outputs.tag, 'rc') }}
          files: |
            ha_roomba_plus.zip
            ha_roomba_plus-${{ steps.version.outputs.tag }}-full.zip
